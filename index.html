<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE BRAIN</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="THE BRAIN">
<meta name="theme-color" content="#2c3a35">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%232c3a35'/%3E%3Ctext x='256' y='220' font-family='Georgia,serif' font-weight='700' font-size='88' fill='%23e8d5d5' text-anchor='middle'%3ETHE%3C/text%3E%3Ctext x='256' y='340' font-family='Georgia,serif' font-weight='700' font-size='88' fill='%23a03050' text-anchor='middle'%3EBRAIN%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%232c3a35'/%3E%3Ctext x='32' y='26' font-family='Georgia,serif' font-weight='700' font-size='11' fill='%23e8d5d5' text-anchor='middle'%3ETHE%3C/text%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-weight='700' font-size='11' fill='%23a03050' text-anchor='middle'%3EBRAIN%3C/text%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  /* Original palette */
  --bg:#1c2526;--white:#ffffff;--border:rgba(255,255,255,.09);--accent:#d4817a;
  --c-music:#d4817a;--n-music:#ecc5c2;
  --c-money:#7ec8a8;--n-money:#c0e8d8;
  --c-tasks:#c8b840;--n-tasks:#ede8b8;
  --c-ideas:#7aaec8;--n-ideas:#bcd8ea;
  --c-shopping:#9b8fcc;--n-shopping:#ccc8e8;
  --c-done:#6b8c6b;--n-done:#c8d8c8;
}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:opacity .5s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-the{font-size:1.6rem;font-weight:900;letter-spacing:.15em;color:rgba(255,255,255,.4);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.sp-brain{font-size:3rem;font-weight:900;letter-spacing:.1em;color:var(--accent);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:18px;animation:spulse 1.2s infinite;}
@keyframes spulse{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}

/* APP */
.app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 14px;height:58px;flex-shrink:0;background:rgba(0,0,0,.35);border-bottom:1px solid var(--border);}
.header-left{display:flex;align-items:center;gap:7px;}
.back-btn{display:none;align-items:center;gap:5px;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;padding:7px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);white-space:nowrap;}
.back-btn.show{display:flex;}
.back-btn:active{background:rgba(255,255,255,.1);}
.undo-btn{font-size:.65rem;font-weight:700;padding:6px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);cursor:pointer;}
.undo-btn:disabled{opacity:.2;}
.logo{font-size:1.5rem;font-weight:900;letter-spacing:.12em;text-align:center;cursor:pointer;user-select:none;color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.logo em{font-style:normal;color:var(--accent);}
.header-right{display:flex;justify-content:flex-end;align-items:center;gap:6px;}
.hdr-btn{font-size:.62rem;font-weight:700;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.38);cursor:pointer;white-space:nowrap;}
.hdr-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0;}
.sync-dot.ok{background:#4ecb71;}.sync-dot.err{background:#ff5252;}.sync-dot.spin{animation:spulse 1s infinite;background:#f5c400;}

/* BREADCRUMB */
.breadcrumb{display:none;padding:7px 16px 5px;background:rgba(0,0,0,.15);border-bottom:1px solid var(--border);flex-shrink:0;font-size:.72rem;color:rgba(255,255,255,.35);direction:rtl;}
.breadcrumb.show{display:block;}
.breadcrumb span{color:var(--white);font-weight:700;}

/* BOARD */
.board{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px 30px;-webkit-overflow-scrolling:touch;}
.board::-webkit-scrollbar{width:3px;}
.board::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}

/* HOME GRID — per-category color, softer gradients */
.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:600px){.home-grid{grid-template-columns:repeat(3,1fr);gap:14px;}}
@media(min-width:900px){.home-grid{grid-template-columns:repeat(6,1fr);gap:14px;max-width:1100px;margin:0 auto;}}
.home-tile{border-radius:16px;cursor:pointer;position:relative;overflow:hidden;aspect-ratio:.95;animation:tileIn .3s cubic-bezier(.16,1,.3,1) both;-webkit-tap-highlight-color:transparent;}
@media(min-width:900px){.home-tile{aspect-ratio:.85;}}
@keyframes tileIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.home-tile:active{transform:scale(.95);}
.home-tile.wobble{animation:wobble .35s ease infinite;}
@keyframes wobble{0%,100%{transform:rotate(-1.2deg)}50%{transform:rotate(1.2deg)}}
.ht-bg{position:absolute;inset:0;}
.ht-bg img{width:100%;height:100%;object-fit:cover;}
.ht-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,rgba(0,0,0,.0) 50%,transparent 100%);}
.ht-content{position:absolute;bottom:0;left:0;right:0;padding:13px;}
.ht-icon{font-size:1.7rem;display:block;margin-bottom:5px;}
.ht-name{font-size:1rem;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);}
.ht-count{font-size:.67rem;color:rgba(255,255,255,.6);margin-top:2px;font-weight:600;}
.ht-edit{position:absolute;top:10px;left:10px;display:none;gap:6px;z-index:5;}
.wobble .ht-edit{display:flex;}
.ht-edit-btn{background:rgba(0,0,0,.45);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;color:#fff;backdrop-filter:blur(4px);}

/* ARTIST GRID */
.artist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:500px){.artist-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:700px){.artist-grid{grid-template-columns:repeat(4,1fr);gap:14px;}}
@media(min-width:900px){.artist-grid{grid-template-columns:repeat(5,1fr);gap:14px;max-width:1100px;margin:0 auto;}}
.artist-tile{border-radius:14px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;animation:tileIn .25s cubic-bezier(.16,1,.3,1) both;}
.artist-tile:active{transform:scale(.96);}
.artist-tile-img{width:100%;aspect-ratio:1;object-fit:cover;background:rgba(255,255,255,.06);}
.artist-tile-ph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:800;}
.artist-tile-info{padding:10px 12px 12px;}
.artist-tile-name{font-size:.92rem;font-weight:800;color:var(--white);}
.artist-tile-count{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:2px;}
.artist-add{border-radius:14px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;aspect-ratio:1;color:rgba(255,255,255,.28);font-size:.82rem;font-weight:700;}

/* SUB GRID */
.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:600px){.sub-grid{grid-template-columns:repeat(3,1fr);}}
.sub-tile{border-radius:14px;padding:18px 14px;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);min-height:88px;display:flex;flex-direction:column;justify-content:space-between;animation:tileIn .22s cubic-bezier(.16,1,.3,1) both;}
.sub-tile:active{transform:scale(.96);}
.sub-tile-name{font-size:.92rem;font-weight:800;color:var(--white);}
.sub-tile-count{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:4px;}
.sub-tile-bar{height:2px;border-radius:1px;margin-top:10px;opacity:.4;}
.sub-add{border-radius:14px;padding:18px 14px;cursor:pointer;background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.1);min-height:88px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.25);font-size:.82rem;font-weight:700;}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
@media(min-width:900px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}}
.card{background:var(--note-bg,var(--n-music));border-radius:4px;padding:14px 13px 12px;position:relative;cursor:pointer;box-shadow:2px 3px 10px rgba(0,0,0,.28);min-height:90px;direction:rtl;text-align:right;animation:tileIn .2s cubic-bezier(.16,1,.3,1) both;}
.card:active{transform:scale(.97);}
.card.done-card{opacity:.5;filter:grayscale(.4);}
.card.done-card .card-text{text-decoration:line-through;}
.card.pressing{outline:2px dashed rgba(200,60,60,.7);outline-offset:2px;}
.card-pin{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#aaa);box-shadow:0 2px 4px rgba(0,0,0,.35);}
.card-sub{font-size:.55rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:rgba(0,0,0,.3);margin-bottom:5px;}
.card-text{font-size:.96rem;font-weight:600;color:#1a1a1a;line-height:1.45;word-break:break-word;white-space:pre-wrap;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px;flex-direction:row-reverse;}
.card-date{font-size:.54rem;color:rgba(0,0,0,.25);}
.card-badges{display:flex;gap:3px;}
.card-badge{font-size:.58rem;font-weight:700;background:rgba(0,0,0,.1);padding:1px 5px;border-radius:8px;color:rgba(0,0,0,.4);}

/* TASKS */
.filter-bar{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;direction:rtl;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-pill{padding:7px 16px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#000;}
.task-list{display:flex;flex-direction:column;gap:2px;}
@media(min-width:700px){.task-list{max-width:640px;margin:0 auto;width:100%;}}
.task-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;direction:rtl;transition:background .12s;}
.task-item:first-child{border-radius:12px 12px 0 0;}.task-item:last-child{border-radius:0 0 12px 12px;border-bottom:none;}
.task-item:hover{background:rgba(255,255,255,.08);}
.task-item.done-task{opacity:.45;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.task-check.checked{background:var(--accent);border-color:var(--accent);}
.task-check.checked::after{content:'✓';color:#000;font-size:.75rem;font-weight:800;}
.task-text-wrap{flex:1;}
.task-text{font-size:.95rem;font-weight:600;color:var(--white);line-height:1.3;}
.task-text.done-t{text-decoration:line-through;color:rgba(255,255,255,.4);}
.task-sub-badge{font-size:.58rem;font-weight:700;color:rgba(255,255,255,.3);margin-top:2px;}
.task-add-row{display:flex;align-items:center;gap:10px;padding:13px 16px;color:rgba(255,255,255,.3);cursor:pointer;font-size:.88rem;font-weight:600;direction:rtl;border-top:1px solid rgba(255,255,255,.06);}
.task-add-row:hover{color:rgba(255,255,255,.6);}

/* MONEY */
.money-list{display:flex;flex-direction:column;gap:2px;}
@media(min-width:700px){.money-list{max-width:640px;margin:0 auto;width:100%;}}
.money-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;direction:rtl;}
.money-item:first-child{border-radius:12px 12px 0 0;}.money-item:last-child{border-radius:0 0 12px 12px;border-bottom:none;}
.money-item:hover{background:rgba(255,255,255,.08);}
.money-name{font-size:.95rem;font-weight:700;color:var(--white);}
.money-sub-badge{font-size:.6rem;color:rgba(255,255,255,.35);margin-top:2px;font-weight:600;}
.money-amount{text-align:left;direction:ltr;}
.money-total{font-size:.9rem;font-weight:800;color:var(--white);}
.money-remain{font-size:.62rem;margin-top:1px;}
.money-remain.owed{color:#ff9090;}.money-remain.paid{color:#70c090;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty-big{font-size:1.6rem;font-weight:900;color:rgba(255,255,255,.07);margin-bottom:6px;}
.empty-sub{font-size:.82rem;color:rgba(255,255,255,.2);line-height:1.7;}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:-100%;width:min(420px,95vw);height:100%;background:#232e30;border-left:1px solid rgba(255,255,255,.1);z-index:501;transition:right .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;direction:rtl;box-shadow:-8px 0 40px rgba(0,0,0,.5);}
.drawer.open{right:0;}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.drawer-badge{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:#000;}
.drawer-close{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.drawer-title{font-size:1.2rem;font-weight:800;padding:14px 16px 4px;color:var(--white);outline:none;word-break:break-word;}
.drawer-title[contenteditable="true"]{border-bottom:2px solid var(--accent);}
.drawer-body{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
.d-sec{margin-top:16px;}
.d-lbl{font-size:.58rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:7px;}
.d-notes{width:100%;min-height:75px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;line-height:1.5;padding:10px 12px;resize:none;outline:none;text-align:right;direction:rtl;}
.d-notes::placeholder{color:rgba(255,255,255,.18);}
.d-tasks-drawer{display:flex;flex-direction:column;gap:6px;}
.d-task{display:flex;align-items:center;gap:8px;direction:rtl;}
.d-task input[type=checkbox]{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--accent);}
.d-task-txt{flex:1;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;outline:none;text-align:right;direction:rtl;padding:3px 0;}
.d-task-txt.done-t{text-decoration:line-through;opacity:.4;}
.d-task-del{background:none;border:none;color:rgba(255,255,255,.18);cursor:pointer;font-size:.9rem;padding:0 4px;flex-shrink:0;}
.add-task-btn{display:flex;align-items:center;gap:6px;font-size:.78rem;color:rgba(255,255,255,.28);cursor:pointer;padding:7px 0;background:none;border:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;direction:rtl;width:100%;}
.d-money{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;}
.d-mf{display:flex;flex-direction:column;gap:4px;}
.d-ml{font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.28);}
.d-mi{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--white);font-size:.9rem;font-weight:700;padding:8px;outline:none;text-align:center;width:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;direction:ltr;}
.d-mremain{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.07);border-radius:4px;font-size:.9rem;font-weight:900;padding:8px;text-align:center;direction:ltr;}
.d-statuses{display:flex;gap:6px;flex-wrap:wrap;}
.d-sbtn{font-size:.72rem;font-weight:700;padding:6px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.38);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.d-sbtn.active{background:var(--accent);border-color:var(--accent);color:#000;}
.drawer-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.d-save-btn{width:100%;padding:13px;border-radius:8px;border:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;background:var(--accent);color:#000;}
.d-save-btn:active{filter:brightness(1.1);}
.drawer-foot-row{display:flex;gap:8px;}
.d-done-btn{flex:1;padding:11px;border-radius:7px;border:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);}
.d-done-btn.is-done{background:rgba(80,140,80,.25);color:#80c090;}
.d-move-btn{flex:1;padding:11px;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.8rem;font-weight:700;color:rgba(255,255,255,.45);cursor:pointer;}
.d-del-btn{padding:11px 13px;border-radius:7px;border:none;background:rgba(180,50,50,.12);color:rgba(220,100,100,.55);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;}

/* FAB */
.fab{position:fixed;bottom:24px;left:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;font-size:1.5rem;color:#000;box-shadow:0 4px 18px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.fab:active{transform:scale(.92);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#222e30;border:1px solid rgba(255,255,255,.1);border-radius:14px;width:100%;max-width:400px;padding:20px;direction:rtl;}
.modal h2{font-size:.95rem;font-weight:800;margin-bottom:14px;color:var(--white);}
.modal-folders{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.mf-btn{font-size:.72rem;font-weight:700;padding:7px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.1);background:none;color:rgba(255,255,255,.4);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.mf-btn.active{color:#000;}
.modal-subs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;min-height:28px;}
.ms-btn{font-size:.68rem;font-weight:600;padding:5px 11px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.38);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.ms-btn.active{background:rgba(255,255,255,.14);color:var(--white);}
#modal-text{width:100%;border:1px solid rgba(255,255,255,.1);border-radius:6px;background:rgba(0,0,0,.2);color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;padding:11px;resize:none;outline:none;min-height:80px;text-align:right;direction:rtl;line-height:1.5;}
#modal-text::placeholder{color:rgba(255,255,255,.16);}
.modal-actions{display:flex;gap:8px;margin-top:12px;}
.modal-save{flex:1;padding:12px;border:none;border-radius:7px;background:var(--accent);color:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;}
.modal-cancel{padding:12px 16px;border:1px solid rgba(255,255,255,.1);border-radius:7px;background:none;color:rgba(255,255,255,.4);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.88rem;cursor:pointer;}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;align-items:flex-end;justify-content:center;}
.sheet-overlay.open{display:flex;}
.sheet{background:#222e30;border-radius:18px 18px 0 0;width:100%;max-width:500px;padding:20px 20px 30px;direction:rtl;max-height:70vh;overflow-y:auto;}
.sheet-title{font-size:.82rem;font-weight:800;color:rgba(255,255,255,.45);margin-bottom:14px;text-align:center;letter-spacing:.08em;text-transform:uppercase;}
.sheet-list{display:flex;flex-direction:column;gap:6px;}
.sheet-btn{display:flex;align-items:center;gap:10px;padding:13px;border-radius:10px;border:none;background:rgba(255,255,255,.06);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.9rem;font-weight:700;color:var(--white);width:100%;text-align:right;direction:rtl;}
.sheet-btn:hover{background:rgba(255,255,255,.1);}
.sheet-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sheet-cancel{width:100%;margin-top:10px;padding:13px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:none;color:rgba(255,255,255,.4);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.9rem;cursor:pointer;}

/* FIREBASE SETUP */
#fb-setup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#fb-setup.open{display:flex;}
.fb-box{background:#1e2a2c;border:1px solid rgba(255,255,255,.15);border-radius:14px;width:100%;max-width:460px;padding:26px;direction:rtl;}
.fb-box h2{font-size:1.1rem;font-weight:800;margin-bottom:8px;color:var(--white);}
.fb-box p{font-size:.8rem;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:16px;}
.fb-steps{font-size:.78rem;color:rgba(255,255,255,.6);margin-bottom:14px;line-height:1.9;}
.fb-steps a{color:var(--accent);}
.fb-inp{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.85rem;padding:12px 14px;outline:none;direction:ltr;text-align:left;margin-bottom:10px;}
.fb-inp::placeholder{color:rgba(255,255,255,.2);}
.fb-save{width:100%;padding:13px;border:none;border-radius:8px;background:var(--accent);color:#000;font-weight:800;font-size:.92rem;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.fb-skip{width:100%;padding:10px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:none;color:rgba(255,255,255,.35);font-size:.8rem;cursor:pointer;margin-top:8px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.fb-msg{font-size:.72rem;color:rgba(255,255,255,.4);text-align:center;margin-top:8px;min-height:18px;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(14,20,22,.97);color:var(--white);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 18px;font-size:.84rem;max-width:440px;width:90%;text-align:center;opacity:0;transition:opacity .2s,transform .2s;z-index:999;pointer-events:none;direction:rtl;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:opacity .5s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-the{font-size:1.6rem;font-weight:300;letter-spacing:.3em;color:rgba(240,232,228,.4);font-family:Georgia,serif;}
.sp-brain{font-size:3rem;font-weight:700;letter-spacing:.08em;color:var(--accent);font-family:Georgia,serif;}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:18px;animation:spulse 1.2s infinite;}
@keyframes spulse{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}

/* APP */
.app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 14px;height:58px;flex-shrink:0;background:rgba(0,0,0,.25);border-bottom:1px solid var(--border);}
.header-left{display:flex;align-items:center;gap:7px;}
.back-btn{display:none;align-items:center;gap:5px;font-size:.78rem;font-weight:600;color:rgba(240,232,228,.5);cursor:pointer;padding:7px 12px;border-radius:20px;border:1px solid rgba(240,232,228,.12);background:rgba(240,232,228,.04);white-space:nowrap;}
.back-btn.show{display:flex;}
.back-btn:active{background:rgba(255,255,255,.1);}
.undo-btn{font-size:.65rem;font-weight:700;padding:6px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);cursor:pointer;}
.undo-btn:disabled{opacity:.2;}
.header-right{display:flex;justify-content:flex-end;align-items:center;gap:6px;}
.hdr-btn{font-size:.62rem;font-weight:700;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.38);cursor:pointer;white-space:nowrap;}
.hdr-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0;}
.sync-dot.ok{background:#4ecb71;}.sync-dot.err{background:#ff5252;}.sync-dot.spin{animation:spulse 1s infinite;background:#f5c400;}

/* BREADCRUMB */
.breadcrumb{display:none;padding:7px 16px 5px;background:rgba(0,0,0,.15);border-bottom:1px solid var(--border);flex-shrink:0;font-size:.72rem;color:rgba(255,255,255,.35);direction:rtl;}
.breadcrumb.show{display:block;}
.breadcrumb span{color:var(--white);font-weight:700;}

/* BOARD */
.board{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px 90px;-webkit-overflow-scrolling:touch;}
.board::-webkit-scrollbar{width:3px;}
.board::-webkit-scrollbar-thumb{background:rgba(240,232,228,.1);}

/* HOME GRID */
.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.home-tile{border-radius:18px;cursor:pointer;position:relative;overflow:hidden;aspect-ratio:.95;animation:tileIn .3s cubic-bezier(.16,1,.3,1) both;-webkit-tap-highlight-color:transparent;}
@keyframes tileIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.home-tile:active{transform:scale(.95);}
.home-tile.wobble{animation:wobble .35s ease infinite;}
@keyframes wobble{0%,100%{transform:rotate(-1.2deg)}50%{transform:rotate(1.2deg)}}
.ht-bg{position:absolute;inset:0;}
.ht-bg img{width:100%;height:100%;object-fit:cover;}
.ht-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.05) 55%,transparent 100%);}
.ht-content{position:absolute;bottom:0;left:0;right:0;padding:14px;}
.ht-icon{font-size:1.8rem;display:block;margin-bottom:6px;}
.ht-name{font-size:1rem;font-weight:800;color:#fff;}
.ht-count{font-size:.67rem;color:rgba(255,255,255,.5);margin-top:2px;font-weight:500;}
.ht-edit{position:absolute;top:10px;left:10px;display:none;gap:6px;z-index:5;}
.wobble .ht-edit{display:flex;}
.ht-edit-btn{background:rgba(0,0,0,.45);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;color:#fff;backdrop-filter:blur(4px);}

/* ARTIST GRID */
.artist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.artist-tile{border-radius:16px;overflow:hidden;cursor:pointer;background:rgba(240,232,228,.06);border:1px solid rgba(240,232,228,.1);display:flex;flex-direction:column;animation:tileIn .25s cubic-bezier(.16,1,.3,1) both;}
.artist-tile:active{transform:scale(.96);}
.artist-tile-img{width:100%;aspect-ratio:1;object-fit:cover;background:rgba(240,232,228,.06);}
.artist-tile-ph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:800;}
.artist-tile-info{padding:10px 12px 12px;}
.artist-tile-name{font-size:.92rem;font-weight:800;color:var(--white);}
.artist-tile-count{font-size:.65rem;color:rgba(240,232,228,.4);margin-top:2px;}
.artist-add{border-radius:16px;overflow:hidden;cursor:pointer;background:rgba(240,232,228,.03);border:2px dashed rgba(240,232,228,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;aspect-ratio:1;color:rgba(240,232,228,.28);font-size:.82rem;font-weight:700;}

/* SUB GRID */
.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.sub-tile{border-radius:14px;padding:18px 14px;cursor:pointer;background:rgba(240,232,228,.06);border:1px solid rgba(240,232,228,.1);min-height:88px;display:flex;flex-direction:column;justify-content:space-between;animation:tileIn .22s cubic-bezier(.16,1,.3,1) both;}
.sub-tile:active{transform:scale(.96);}
.sub-tile-name{font-size:.92rem;font-weight:800;color:var(--white);}
.sub-tile-count{font-size:.65rem;color:rgba(240,232,228,.4);margin-top:4px;}
.sub-tile-bar{height:2px;border-radius:1px;margin-top:10px;opacity:.35;}
.sub-add{border-radius:14px;padding:18px 14px;cursor:pointer;background:rgba(240,232,228,.03);border:2px dashed rgba(240,232,228,.1);min-height:88px;display:flex;align-items:center;justify-content:center;color:rgba(240,232,228,.25);font-size:.82rem;font-weight:700;}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;}
.card{background:var(--note-bg,#e8d0d8);border-radius:6px;padding:13px 13px 11px;position:relative;cursor:pointer;box-shadow:2px 3px 12px rgba(0,0,0,.22);min-height:86px;direction:rtl;text-align:right;animation:tileIn .2s cubic-bezier(.16,1,.3,1) both;}
.card:active{transform:scale(.97);}
.card.done-card{opacity:.5;filter:grayscale(.4);}
.card.done-card .card-text{text-decoration:line-through;}
.card.pressing{outline:2px dashed rgba(200,60,60,.7);outline-offset:2px;}
.card-pin{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#aaa);box-shadow:0 2px 4px rgba(0,0,0,.35);}
.card-sub{font-size:.55rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:rgba(0,0,0,.3);margin-bottom:5px;}
.card-text{font-size:.96rem;font-weight:600;color:#1a1a1a;line-height:1.45;word-break:break-word;white-space:pre-wrap;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px;flex-direction:row-reverse;}
.card-date{font-size:.54rem;color:rgba(0,0,0,.25);}
.card-badges{display:flex;gap:3px;}
.card-badge{font-size:.58rem;font-weight:700;background:rgba(0,0,0,.1);padding:1px 5px;border-radius:8px;color:rgba(0,0,0,.4);}

/* TASKS */
.filter-bar{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;direction:rtl;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-pill{padding:7px 16px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#000;}
.task-list{display:flex;flex-direction:column;gap:2px;}
.task-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(240,232,228,.05);border-bottom:1px solid rgba(240,232,228,.06);cursor:pointer;direction:rtl;transition:background .12s;}
.task-item:first-child{border-radius:12px 12px 0 0;}.task-item:last-child{border-radius:0 0 12px 12px;border-bottom:none;}
.task-item:active{background:rgba(240,232,228,.1);}
.task-item.done-task{opacity:.45;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(240,232,228,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.task-check.checked{background:var(--accent);border-color:var(--accent);}
.task-check.checked::after{content:'✓';color:#fff;font-size:.75rem;font-weight:800;}
.task-text-wrap{flex:1;}
.task-text{font-size:.95rem;font-weight:600;color:var(--white);line-height:1.3;}
.task-text.done-t{text-decoration:line-through;color:rgba(240,232,228,.4);}
.task-sub-badge{font-size:.58rem;font-weight:700;color:rgba(240,232,228,.3);margin-top:2px;}
.task-add-row{display:flex;align-items:center;gap:10px;padding:13px 16px;color:rgba(240,232,228,.3);cursor:pointer;font-size:.88rem;font-weight:600;direction:rtl;border-top:1px solid rgba(240,232,228,.06);}

/* MONEY */
.money-list{display:flex;flex-direction:column;gap:2px;}
.money-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(240,232,228,.05);border-bottom:1px solid rgba(240,232,228,.06);cursor:pointer;direction:rtl;}
.money-item:first-child{border-radius:12px 12px 0 0;}.money-item:last-child{border-radius:0 0 12px 12px;border-bottom:none;}
.money-item:active{background:rgba(240,232,228,.1);}
.money-name{font-size:.95rem;font-weight:700;color:var(--white);}
.money-sub-badge{font-size:.6rem;color:rgba(240,232,228,.35);margin-top:2px;font-weight:600;}
.money-amount{text-align:left;direction:ltr;}
.money-total{font-size:.9rem;font-weight:800;color:var(--white);}
.money-remain{font-size:.62rem;color:rgba(240,232,228,.4);margin-top:1px;}
.money-remain.owed{color:#e07070;}.money-remain.paid{color:#70c090;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty-big{font-size:1.6rem;font-weight:900;color:rgba(240,232,228,.07);margin-bottom:6px;}
.empty-sub{font-size:.82rem;color:rgba(240,232,228,.2);line-height:1.7;}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:-100%;width:min(420px,95vw);height:100%;background:#1e2a26;border-left:1px solid rgba(240,232,228,.1);z-index:501;transition:right .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;direction:rtl;box-shadow:-8px 0 40px rgba(0,0,0,.5);}
.drawer.open{right:0;}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(240,232,228,.08);flex-shrink:0;}
.drawer-badge{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--accent);color:#fff;}
.drawer-close{width:38px;height:38px;border-radius:50%;border:1px solid rgba(240,232,228,.15);background:rgba(240,232,228,.06);color:rgba(240,232,228,.6);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.drawer-title{font-size:1.2rem;font-weight:800;padding:14px 16px 4px;color:var(--white);outline:none;word-break:break-word;}
.drawer-title[contenteditable="true"]{border-bottom:2px solid var(--accent);}
.drawer-body{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
.d-sec{margin-top:16px;}
.d-lbl{font-size:.58rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(240,232,228,.28);margin-bottom:7px;}
.d-notes{width:100%;min-height:75px;background:rgba(0,0,0,.2);border:1px solid rgba(240,232,228,.1);border-radius:6px;color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;line-height:1.5;padding:10px 12px;resize:none;outline:none;text-align:right;direction:rtl;}
.d-notes::placeholder{color:rgba(240,232,228,.18);}
.d-tasks-drawer{display:flex;flex-direction:column;gap:6px;}
.d-task{display:flex;align-items:center;gap:8px;direction:rtl;}
.d-task input[type=checkbox]{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--accent);}
.d-task-txt{flex:1;background:none;border:none;border-bottom:1px solid rgba(240,232,228,.1);color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;outline:none;text-align:right;direction:rtl;padding:3px 0;}
.d-task-txt.done-t{text-decoration:line-through;opacity:.4;}
.d-task-del{background:none;border:none;color:rgba(240,232,228,.18);cursor:pointer;font-size:.9rem;padding:0 4px;flex-shrink:0;}
.add-task-btn{display:flex;align-items:center;gap:6px;font-size:.78rem;color:rgba(240,232,228,.28);cursor:pointer;padding:7px 0;background:none;border:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;direction:rtl;width:100%;}
.d-money{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;}
.d-mf{display:flex;flex-direction:column;gap:4px;}
.d-ml{font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(240,232,228,.28);}
.d-mi{background:rgba(0,0,0,.2);border:1px solid rgba(240,232,228,.1);border-radius:4px;color:var(--white);font-size:.9rem;font-weight:700;padding:8px;outline:none;text-align:center;width:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;direction:ltr;}
.d-mremain{background:rgba(0,0,0,.25);border:1px solid rgba(240,232,228,.07);border-radius:4px;font-size:.9rem;font-weight:900;padding:8px;text-align:center;direction:ltr;}
.d-statuses{display:flex;gap:6px;flex-wrap:wrap;}
.d-sbtn{font-size:.72rem;font-weight:700;padding:6px 13px;border-radius:20px;border:1.5px solid rgba(240,232,228,.1);background:rgba(240,232,228,.04);color:rgba(240,232,228,.38);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.d-sbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.drawer-foot{padding:12px 16px;border-top:1px solid rgba(240,232,228,.07);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.d-save-btn{width:100%;padding:13px;border-radius:8px;border:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff;}
.d-save-btn:active{filter:brightness(1.1);}
.drawer-foot-row{display:flex;gap:8px;}
.d-done-btn{flex:1;padding:11px;border-radius:7px;border:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;background:rgba(240,232,228,.07);color:rgba(240,232,228,.5);}
.d-done-btn.is-done{background:rgba(80,140,80,.25);color:#80c090;}
.d-move-btn{flex:1;padding:11px;border-radius:7px;border:1px solid rgba(240,232,228,.12);background:rgba(240,232,228,.04);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.8rem;font-weight:700;color:rgba(240,232,228,.45);cursor:pointer;}
.d-del-btn{padding:11px 13px;border-radius:7px;border:none;background:rgba(180,50,50,.12);color:rgba(220,100,100,.55);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;}

/* BOTTOM BAR */
.bottombar{position:fixed;bottom:0;left:0;right:0;background:rgba(28,38,34,.97);border-top:1px solid var(--border);z-index:200;display:flex;align-items:stretch;direction:rtl;min-height:66px;}
.bottom-prefix{font-size:.65rem;font-weight:800;letter-spacing:.06em;color:var(--accent);padding:0 12px;white-space:nowrap;flex-shrink:0;border-left:1px solid var(--border);display:flex;align-items:center;}
#chat-input{flex:1;border:none;outline:none;resize:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;color:var(--white);padding:12px;background:transparent;caret-color:var(--accent);text-align:right;direction:rtl;line-height:1.4;min-height:66px;max-height:120px;}
#chat-input::placeholder{color:rgba(240,232,228,.13);}
.bottom-actions{display:flex;align-items:stretch;flex-direction:row-reverse;border-right:1px solid var(--border);}
.mic-btn{width:60px;border:none;background:rgba(240,232,228,.03);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-left:1px solid var(--border);}
.mic-btn:active{background:rgba(240,232,228,.08);}
.mic-btn.listening{background:rgba(160,48,80,.25);}
.mic-icon{font-size:1.3rem;line-height:1;}
.mic-lbl{font-size:.48rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:rgba(240,232,228,.3);}
.mic-btn.listening .mic-lbl{color:#e09090;}
.send-btn{padding:0 15px;border:none;background:var(--accent);color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.05em;cursor:pointer;white-space:nowrap;}
.send-btn:active{filter:brightness(1.1);}
.send-btn:disabled{background:rgba(240,232,228,.08);color:rgba(240,232,228,.25);}

/* FAB */
.fab{position:fixed;bottom:78px;left:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;font-size:1.5rem;color:#fff;box-shadow:0 4px 18px rgba(160,48,80,.4);display:flex;align-items:center;justify-content:center;z-index:100;}
.fab:active{transform:scale(.92);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#1e2a26;border:1px solid rgba(240,232,228,.1);border-radius:14px;width:100%;max-width:400px;padding:20px;direction:rtl;}
.modal h2{font-size:.95rem;font-weight:800;margin-bottom:14px;color:var(--white);}
.modal-folders{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.mf-btn{font-size:.72rem;font-weight:700;padding:7px 13px;border-radius:20px;border:1.5px solid rgba(240,232,228,.1);background:none;color:rgba(240,232,228,.4);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.mf-btn.active{color:#fff;}
.modal-subs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;min-height:28px;}
.ms-btn{font-size:.68rem;font-weight:600;padding:5px 11px;border-radius:14px;border:1px solid rgba(240,232,228,.1);background:rgba(240,232,228,.04);color:rgba(240,232,228,.38);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.ms-btn.active{background:rgba(240,232,228,.14);color:var(--white);}
#modal-text{width:100%;border:1px solid rgba(240,232,228,.1);border-radius:6px;background:rgba(0,0,0,.2);color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.92rem;padding:11px;resize:none;outline:none;min-height:80px;text-align:right;direction:rtl;line-height:1.5;}
#modal-text::placeholder{color:rgba(240,232,228,.16);}
.modal-actions{display:flex;gap:8px;margin-top:12px;}
.modal-save{flex:1;padding:12px;border:none;border-radius:7px;background:var(--accent);color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;}
.modal-cancel{padding:12px 16px;border:1px solid rgba(240,232,228,.1);border-radius:7px;background:none;color:rgba(240,232,228,.4);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.88rem;cursor:pointer;}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;align-items:flex-end;justify-content:center;}
.sheet-overlay.open{display:flex;}
.sheet{background:#1e2a26;border-radius:18px 18px 0 0;width:100%;max-width:500px;padding:20px 20px 30px;direction:rtl;max-height:70vh;overflow-y:auto;}
.sheet-title{font-size:.82rem;font-weight:800;color:rgba(240,232,228,.45);margin-bottom:14px;text-align:center;letter-spacing:.08em;text-transform:uppercase;}
.sheet-list{display:flex;flex-direction:column;gap:6px;}
.sheet-btn{display:flex;align-items:center;gap:10px;padding:13px;border-radius:10px;border:none;background:rgba(240,232,228,.06);cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.9rem;font-weight:700;color:var(--white);width:100%;text-align:right;direction:rtl;}
.sheet-btn:active{background:rgba(240,232,228,.12);}
.sheet-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sheet-cancel{width:100%;margin-top:10px;padding:13px;border:1px solid rgba(240,232,228,.1);border-radius:10px;background:none;color:rgba(240,232,228,.4);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.9rem;cursor:pointer;}

/* FIREBASE SETUP */
#fb-setup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#fb-setup.open{display:flex;}
.fb-box{background:#1e2a26;border:1px solid rgba(240,232,228,.15);border-radius:14px;width:100%;max-width:460px;padding:26px;direction:rtl;}
.fb-box h2{font-size:1.1rem;font-weight:800;margin-bottom:8px;color:var(--white);}
.fb-box p{font-size:.8rem;color:rgba(240,232,228,.5);line-height:1.6;margin-bottom:16px;}
.fb-steps{font-size:.78rem;color:rgba(240,232,228,.6);margin-bottom:14px;line-height:1.9;}
.fb-steps a{color:var(--accent);}
.fb-inp{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(240,232,228,.15);border-radius:7px;color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:.85rem;padding:12px 14px;outline:none;direction:ltr;text-align:left;margin-bottom:10px;}
.fb-inp::placeholder{color:rgba(240,232,228,.2);}
.fb-save{width:100%;padding:13px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:.92rem;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.fb-skip{width:100%;padding:10px;border:1px solid rgba(240,232,228,.1);border-radius:8px;background:none;color:rgba(240,232,228,.35);font-size:.8rem;cursor:pointer;margin-top:8px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.fb-msg{font-size:.72rem;color:rgba(240,232,228,.4);text-align:center;margin-top:8px;min-height:18px;}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(20,28,24,.97);color:var(--white);border:1px solid rgba(240,232,228,.1);border-radius:8px;padding:10px 18px;font-size:.84rem;max-width:440px;width:90%;text-align:center;opacity:0;transition:opacity .2s,transform .2s;z-index:999;pointer-events:none;direction:rtl;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="splash"><span class="sp-the">THE</span><span class="sp-brain">BRAIN</span><div class="sp-dot"></div></div>

<div id="fb-setup">
  <div class="fb-box">
    <h2>☁️ חיבור ענן</h2>
    <p>כדי שהבריין יסתנכרן בין כל המכשירים, צריך לחבר ל-Firebase (חינמי של Google).</p>
    <div class="fb-steps">1. <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a><br>2. פרויקט <strong>MY BRAIN</strong> ← Build ← Realtime Database<br>3. העתק את הלינק והדבק כאן:</div>
    <input class="fb-inp" id="fb-url-input" type="url" placeholder="https://my-brain-xxx-default-rtdb.firebaseio.com">
    <button class="fb-save" onclick="saveFirebaseConfig()">✓ חבר ושמור</button>
    <button class="fb-skip" onclick="skipFirebase()">המשך בלי ענן</button>
    <div class="fb-msg" id="fb-msg"></div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="back-btn" id="back-btn" onclick="navBack()">← חזרה</div>
      <button class="undo-btn" id="undo-btn" disabled onclick="doUndo()">↩</button>
    </div>
    <div class="logo" onclick="goHome()">THE <em id="logo-em">BRAIN</em></div>
    <div class="header-right">
      <div class="sync-dot spin" id="sync-dot"></div>
      <button class="hdr-btn" onclick="doBackup()" title="גיבוי">💾</button>
      <button class="hdr-btn" id="edit-btn" onclick="toggleEdit()">✏️</button>
    </div>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="board" id="board"></div>
</div>

<button class="fab" id="fab" style="display:none" onclick="openFabMenu()">+</button>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><span class="drawer-badge" id="drawer-badge">—</span><button class="drawer-close" onclick="closeDrawer()">✕</button></div>
  <div class="drawer-title" id="drawer-title"></div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-foot">
    <button class="d-save-btn" onclick="saveDrawer()">✓ אישור ושמור</button>
    <div class="drawer-foot-row">
      <button class="d-done-btn" id="d-done-btn" onclick="drawerToggleDone()">סמן כבוצע</button>
      <button class="d-move-btn" onclick="openMoveTo()">העבר אל...</button>
      <button class="d-del-btn" onclick="drawerDelete()">🗑</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>+ הוסף לבריין</h2>
    <div class="modal-folders" id="modal-folders"></div>
    <div class="modal-subs" id="modal-subs"></div>
    <textarea id="modal-text" placeholder="מה אתה רוצה לזכור?"></textarea>
    <div class="modal-actions"><button class="modal-save" onclick="quickAdd()">📌 הוסף</button><button class="modal-cancel" onclick="closeModal()">ביטול</button></div>
  </div>
</div>

<div class="sheet-overlay" id="moveto-overlay" onclick="if(event.target===this)closeMoveTo()">
  <div class="sheet"><div class="sheet-title">העבר אל...</div><div class="sheet-list" id="moveto-list"></div><button class="sheet-cancel" onclick="closeMoveTo()">ביטול</button></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var FOLDERS=[
  {id:'music',   he:'🎵 מוזיקה', color:'#d4817a',note:'var(--n-music)',  useArtists:true,  subs:['הכל','שירה מרגלית','פרויקטים בהפקה','רעיונות לשירים','JONAMOON']},
  {id:'money',   he:'💰 כסף',    color:'#7ec8a8',note:'var(--n-money)',  directList:true,  subs:['הכל','חייבים לי','אני חייב','חשבונות','שולם']},
  {id:'tasks',   he:'📌 משימות', color:'#c8b840',note:'var(--n-tasks)',  todoMode:true,    subs:['הכל','דחוף','השבוע','ממתין']},
  {id:'ideas',   he:'💡 רעיונות',color:'#7aaec8',note:'var(--n-ideas)',  noSubs:true,      subs:['הכל']},
  {id:'shopping',he:'🛒 קניות',  color:'#9b8fcc',note:'var(--n-shopping)',todoMode:true,   subs:['הכל','ציוד אולפן','הבית','אחר']},
  {id:'done',    he:'✅ בוצע',   color:'#6b8c6b',note:'var(--n-done)',                     subs:['הכל']},
];
var TILE_GRADS={
  music:   'linear-gradient(145deg,#d4817a 0%,#8a3530 100%)',
  money:   'linear-gradient(145deg,#7ec8a8 0%,#2a6845 100%)',
  tasks:   'linear-gradient(145deg,#c8b840 0%,#706520 100%)',
  ideas:   'linear-gradient(145deg,#7aaec8 0%,#2a5878 100%)',
  shopping:'linear-gradient(145deg,#9b8fcc 0%,#4a3888 100%)',
  done:    'linear-gradient(145deg,#6b8c6b 0%,#2a402a 100%)',
};

function uid(){return Math.random().toString(36).slice(2,9);}
function today(){return new Date().toLocaleDateString('he-IL',{day:'numeric',month:'numeric',year:'numeric'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function fLabel(f){return f.he||f.id;}

var STORE='brain_data',FB_KEY='brain_fb_url';
var state=JSON.parse(localStorage.getItem(STORE)||'null');
if(!state){var _old=['brain_v11','brain_v10','brain_v9'];for(var _i=0;_i<_old.length;_i++){var _o=JSON.parse(localStorage.getItem(_old[_i])||'null');if(_o&&_o.cards&&_o.cards.length>0){state=_o;localStorage.setItem(STORE,JSON.stringify(state));break;}}}
if(!state){
  function mk(f,s,t){return{id:uid(),folder:f,sub:s,text:t,date:today(),done:false,notes:'',tasks:[],status:'',moneyTotal:'',moneyPaid:''};}
  state={view:'home',activeFolder:null,activeSub:'הכל',activeArtist:null,moneyFilter:'הכל',
    cards:[mk('music','שירה מרגלית','לנצח'),mk('music','שירה מרגלית','שלושים'),mk('music','שירה מרגלית','דפוק'),
      mk('music','JONAMOON','Go Back'),mk('music','JONAMOON','Lose Someone'),mk('music','JONAMOON','Faith'),
      mk('music','JONAMOON','Moving On'),mk('music','JONAMOON','Nevermind'),mk('music','JONAMOON',"Why Don't You Answer"),
      mk('money','חייבים לי','רונה'),mk('money','חייבים לי','שירה — 3 שירים'),mk('money','חייבים לי','חן כהן'),
      mk('money','חייבים לי','רון רווח פדה / מאט'),mk('money','חייבים לי','אבי טולדנו'),mk('money','חייבים לי','גונן עזריה'),
      mk('tasks','דחוף','להזמין מטהר מים'),mk('tasks','דחוף','פוסט הריון'),
      mk('ideas','הכל','בריין — לפתח אפליקציה'),
      mk('shopping','ציוד אולפן','2 x U87'),mk('shopping','ציוד אולפן','Offset Bridge'),mk('shopping','הבית','שולחן קפה')],
    artists:[{id:uid(),name:'שירה מרגלית',photo:null,color:'#d4817a'},{id:uid(),name:'JONAMOON',photo:null,color:'#9b8fcc'},{id:uid(),name:'סנדרסון',photo:null,color:'#7ec8a8'}],
    folderColors:{},folderBgImages:{}};
}
if(!state.artists)state.artists=[];
if(!state.folderColors)state.folderColors={};
if(!state.folderBgImages)state.folderBgImages={};
if(!state.moneyFilter)state.moneyFilter='הכל';

var undoStack=[],openCardId=null,editMode=false,db=null,fbConnected=false;
var modalFolder='music',modalSub=null,navHistory=[];

function save(){localStorage.setItem(STORE,JSON.stringify(state));saveToCloud();}
function saveUndo(){undoStack.push(JSON.stringify(state));if(undoStack.length>30)undoStack.shift();document.getElementById('undo-btn').disabled=false;}
function doUndo(){if(!undoStack.length)return;state=JSON.parse(undoStack.pop());save();render();showToast('↩ בוטל');if(!undoStack.length)document.getElementById('undo-btn').disabled=true;}
function activeF(){return FOLDERS.find(function(f){return f.id===state.activeFolder;});}

// FIREBASE
function syncDot(s){var d=document.getElementById('sync-dot');d.className='sync-dot '+(s==='ok'?'ok':s==='err'?'err':'spin');}

var _ignoreNext=false;
function initFirebase(url){
  try{
    url=url.trim().replace(/\/$/,'');
    var app=firebase.initializeApp({databaseURL:url},'brain-'+Date.now());
    db=firebase.database(app);
    db.ref('brain/data').on('value',function(snap){
      if(_ignoreNext){_ignoreNext=false;syncDot('ok');return;}
      var d=snap.val();
      if(d&&d.cards&&d.cards.length>0){
        // Only update if Firebase data is newer
        var fbUpdated=d.updated||0;
        var localUpdated=state._updated||0;
        if(fbUpdated>localUpdated){
          state.cards=d.cards;
          if(d.artists)state.artists=d.artists;
          if(d.folderColors)state.folderColors=d.folderColors;
          if(d.folderBgImages)state.folderBgImages=d.folderBgImages;
          if(!state.moneyFilter)state.moneyFilter='הכל';
          localStorage.setItem(STORE,JSON.stringify(state));
          render();
        }
        syncDot('ok');
      } else {
        syncDot('ok');
      }
    },function(){syncDot('err');});
    fbConnected=true;localStorage.setItem(FB_KEY,url);syncDot('ok');return true;
  }catch(e){fbConnected=false;syncDot('err');return false;}
}
function saveToCloud(){
  if(!fbConnected||!db)return;
  _ignoreNext=true;
  state._updated=Date.now();
  syncDot('spin');
  db.ref('brain/data').set({
    cards:state.cards,artists:state.artists,
    folderColors:state.folderColors,folderBgImages:state.folderBgImages,
    updated:state._updated
  }).then(function(){syncDot('ok');}).catch(function(){syncDot('err');_ignoreNext=false;});
}
function saveFirebaseConfig(){var url=document.getElementById('fb-url-input').value.trim();if(!url){document.getElementById('fb-msg').textContent='נא להכניס לינק';return;}document.getElementById('fb-msg').textContent='מתחבר...';if(initFirebase(url)){document.getElementById('fb-setup').classList.remove('open');showApp();showToast('☁️ מחובר לענן!');}else document.getElementById('fb-msg').textContent='שגיאה — בדוק את הלינק';}
function skipFirebase(){document.getElementById('fb-setup').classList.remove('open');syncDot('err');showApp();showToast('עובד ללא ענן');}

// BACKUP
function doBackup(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='brain-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('💾 גיבוי הורד');}

// NAVIGATION
function pushNav(){navHistory.push({view:state.view,activeFolder:state.activeFolder,activeSub:state.activeSub,activeArtist:state.activeArtist,moneyFilter:state.moneyFilter});}
function goHome(){navHistory=[];state.view='home';state.activeFolder=null;state.activeSub='הכל';state.activeArtist=null;editMode=false;save();render();}
function navBack(){if(navHistory.length){var p=navHistory.pop();state.view=p.view;state.activeFolder=p.activeFolder;state.activeSub=p.activeSub;state.activeArtist=p.activeArtist;if(p.moneyFilter)state.moneyFilter=p.moneyFilter;save();render();}else goHome();}
function openFolder(fid){pushNav();state.view='folder';state.activeFolder=fid;state.activeSub='הכל';state.activeArtist=null;save();render();}
function openArtist(id){pushNav();state.view='artist';state.activeArtist=id;save();render();}
function openSubFolder(sub){pushNav();state.view='subfolder';state.activeSub=sub;save();render();}
function toggleEdit(){editMode=!editMode;var b=document.getElementById('edit-btn');b.textContent=editMode?'✓ סיום':'✏️';b.className='hdr-btn'+(editMode?' active':'');render();}

// SWIPE — left = one step back (only clear horizontal, not scroll)
var swX=0,swY=0,swA=false,swMoved=false;
document.addEventListener('touchstart',function(e){
  if(e.touches.length!==1)return;
  swX=e.touches[0].clientX;
  swY=e.touches[0].clientY;
  swA=true;swMoved=false;
},{passive:true});
document.addEventListener('touchmove',function(e){
  swMoved=true;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(!swA)return;swA=false;
  if(!swMoved)return;
  var ex=e.changedTouches[0].clientX;
  var ey=e.changedTouches[0].clientY;
  var dx=ex-swX;
  var dy=ey-swY;
  var adx=Math.abs(dx);
  var ady=Math.abs(dy);
  // Must be clearly horizontal
  if(ady>50)return;
  if(adx<60)return;
  if(adx<ady*1.5)return;
  // Swipe RIGHT to LEFT (dx < 0) = back — like iOS edge swipe
  if(dx<-60&&state.view!=='home') navBack();
},{passive:true});

// RENDER
function render(){
  var board=document.getElementById('board'),backBtn=document.getElementById('back-btn'),bc=document.getElementById('breadcrumb'),fab=document.getElementById('fab');
  if(state.activeFolder){var cf=activeF();if(cf)document.documentElement.style.setProperty('--accent',cf.color);}
  else document.documentElement.style.setProperty('--accent','#a03050');
  if(state.view==='home'){backBtn.classList.remove('show');bc.classList.remove('show');fab.style.display='flex';renderHome(board);}
  else if(state.view==='folder'){backBtn.classList.add('show');bc.classList.add('show');var f=activeF();bc.innerHTML='<span>'+fLabel(f||{he:'—'})+'</span>';fab.style.display='flex';if(f&&f.useArtists)renderArtistGrid(board);else if(f&&f.todoMode)renderTasks(board,f);else if(f&&f.directList)renderMoneyList(board,f);else if(f&&f.noSubs)renderCards(board,f,'הכל');else renderSubGrid(board,f);}

function uploadArtistPhoto(id){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.style.cssText='position:fixed;top:-100px;left:-100px;opacity:0;';
  document.body.appendChild(inp);
  inp.onchange=function(){
    if(!inp.files||!inp.files[0])return;
    var file=inp.files[0];
    var img=new Image();
    var objectUrl=URL.createObjectURL(file);
    img.onload=function(){
      var MAX=500;
      var w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var compressed=canvas.toDataURL('image/jpeg',0.75);
      URL.revokeObjectURL(objectUrl);

      // Update in state
      var art=state.artists.find(function(a){return a.id===id;});
      if(!art){try{document.body.removeChild(inp);}catch(e){}return;}
      art.photo=compressed;

      // Save locally first
      localStorage.setItem(STORE,JSON.stringify(state));

      // Save to Firebase with ignore flag
      if(fbConnected&&db){
        _ignoreNext=true;
        state._updated=Date.now();
        syncDot('spin');
        db.ref('brain/data').update({
          artists:state.artists,
          updated:state._updated
        }).then(function(){
          syncDot('ok');
          render();
          showToast('✓ תמונה נשמרה');
        }).catch(function(){
          syncDot('err');
          render();
          showToast('תמונה נשמרה מקומית');
        });
      } else {
        render();
        showToast('✓ תמונה עודכנה');
      }
      try{document.body.removeChild(inp);}catch(e){}
    };
    img.onerror=function(){
      URL.revokeObjectURL(objectUrl);
      showToast('שגיאה בטעינת התמונה');
      try{document.body.removeChild(inp);}catch(e){}
    };
    img.src=objectUrl;
  };
  inp.click();
}

  (card.tasks||[]).forEach(function(t2,i){tl.appendChild(mkTaskRow(card,t2,i));});
  var addT=document.createElement('button');addT.className='add-task-btn';addT.innerHTML='+ הוסף משימה';addT.onclick=function(){addTask(card);};ts.appendChild(addT);body.appendChild(ts);
  // Status
  var statuses=card.folder==='music'?['בהפקה','מיקס','מסטרינג','הושלם','עצור']:card.folder==='tasks'||card.folder==='shopping'?['דחוף','בתהליך','ממתין','הושלם']:['פעיל','בהמתנה','הושלם','עצור'];
  var ss=document.createElement('div');ss.className='d-sec';ss.innerHTML='<div class="d-lbl">סטטוס</div><div class="d-statuses"></div>';
  var sr=ss.querySelector('.d-statuses');
  statuses.forEach(function(s){var btn=document.createElement('button');btn.className='d-sbtn'+(card.status===s?' active':'');btn.textContent=s;btn.onclick=function(){card.status=(card.status===s?'':s);save();renderDrawerBody(card);render();};sr.appendChild(btn);});
  body.appendChild(ss);
}

function updateMoneyCalc(card){
  var base=parseFloat(card.moneyTotal)||0;
  var vat=base*0.18;
  var exp=parseFloat(card.moneyExpenses)||0;
  var total=base+vat+exp;
  var paid=parseFloat(card.moneyPaid)||0;
  var remain=total-paid;
  function setEl(id,val,color){var el=document.getElementById('dm-'+id);if(!el)return;el.textContent=val.toFixed(0)+' ₪';el.style.color=color||'var(--white)';}
  setEl('_vat',vat,'rgba(255,255,255,.5)');
  setEl('_totalBill',total,'var(--white)');
  setEl('_remain',remain,remain>0?'#ff9090':remain<=0?'#70c090':'var(--white)');
}

function saveDrawer(){
  if(!openCardId)return;
  var card=state.cards.find(function(c){return c.id===openCardId;});
  if(card){
    var tEl=document.getElementById('drawer-title');if(tEl){var nt=tEl.innerText.trim();if(nt)card.text=nt;}
    var nEl=document.querySelector('.d-notes');if(nEl)card.notes=nEl.value;
    // Save all money inputs
    document.querySelectorAll('.d-mi[data-key]').forEach(function(inp){card[inp.dataset.key]=inp.value;});
  }
  save();closeDrawer();showToast('✓ נשמר');
}
function closeDrawer(){
  if(openCardId){
    var card=state.cards.find(function(c){return c.id===openCardId;});
    if(card){
      var nEl=document.querySelector('.d-notes');if(nEl)card.notes=nEl.value;
      var tEl=document.getElementById('drawer-title');if(tEl){var nt=tEl.innerText.trim();if(nt)card.text=nt;}
      document.querySelectorAll('.d-mi[data-key]').forEach(function(inp){card[inp.dataset.key]=inp.value;});
      save();render();
    }
  }
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  openCardId=null;
}
function mkTaskRow(card,t2,i){
  var row=document.createElement('div');row.className='d-task';
  var cb=document.createElement('input');cb.type='checkbox';cb.checked=t2.done;
  cb.onchange=function(){t2.done=cb.checked;save();txt.className='d-task-txt'+(t2.done?' done-t':'');};
  var txt=document.createElement('input');txt.type='text';txt.className='d-task-txt'+(t2.done?' done-t':'');
  txt.value=t2.text;txt.placeholder='משימה...';txt.oninput=function(){t2.text=txt.value;};
  txt.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();addTask(card);}};
  var del=document.createElement('button');del.className='d-task-del';del.textContent='✕';
  del.onclick=function(){saveUndo();card.tasks.splice(i,1);save();renderDrawerBody(card);};
  row.appendChild(cb);row.appendChild(txt);row.appendChild(del);return row;
}
function addTask(card){
  if(!card.tasks)card.tasks=[];saveUndo();card.tasks.push({id:uid(),text:'',done:false});
  save();renderDrawerBody(card);
  setTimeout(function(){var ins=document.querySelectorAll('.d-task-txt');if(ins.length)ins[ins.length-1].focus();},50);
}

function drawerToggleDone(){if(!openCardId)return;var card=state.cards.find(function(c){return c.id===openCardId;});if(!card)return;saveUndo();if(card.done){card.done=false;card.folder=card.originalFolder||'tasks';card.sub=card.originalSub||'הכל';delete card.originalFolder;delete card.originalSub;showToast('↩ שוחזר');}else{card.originalFolder=card.folder;card.originalSub=card.sub;card.done=true;var of=FOLDERS.find(function(f){return f.id===card.originalFolder;});card.folder='done';card.sub=of?fLabel(of):'אחר';showToast('✓ בוצע');}var dBtn=document.getElementById('d-done-btn');dBtn.textContent=card.done?'↩ שחזר':'סמן כבוצע';dBtn.className='d-done-btn'+(card.done?' is-done':'');save();render();}
function drawerDelete(){if(!openCardId)return;if(!confirm('למחוק?'))return;saveUndo();state.cards=state.cards.filter(function(c){return c.id!==openCardId;});save();closeDrawer();render();}

// MOVE TO
function openMoveTo(){var list=document.getElementById('moveto-list');list.innerHTML='';FOLDERS.filter(function(f){return f.id!=='done';}).forEach(function(f){var btn=document.createElement('button');btn.className='sheet-btn';btn.innerHTML='<div class="sheet-dot" style="background:'+f.color+'"></div><span>'+fLabel(f)+'</span>';btn.onclick=function(){var card=state.cards.find(function(c){return c.id===openCardId;});if(card){saveUndo();card.folder=f.id;card.sub=f.subs.find(function(s){return s!=='הכל';})||f.subs[0];save();closeMoveTo();saveDrawer();showToast('הועבר אל '+fLabel(f));}};list.appendChild(btn);});document.getElementById('moveto-overlay').classList.add('open');}
function closeMoveTo(){document.getElementById('moveto-overlay').classList.remove('open');}

// FAB MENU
function openFabMenu(){
  var ex=document.getElementById('fab-menu');if(ex){ex.remove();return;}
  var menu=document.createElement('div');menu.id='fab-menu';
  menu.style.cssText='position:fixed;bottom:80px;left:14px;z-index:300;display:flex;flex-direction:column-reverse;gap:8px;';
  var items=[];
  if(state.view==='home')items=[{icon:'📁',label:'הוסף תיקייה',action:addFolderPrompt}];
  else if(state.view==='folder'&&activeF()&&activeF().useArtists)items=[{icon:'🎤',label:'הוסף אמן',action:addArtist},{icon:'🎵',label:'הוסף שיר',action:openAddCard}];
  else if(state.view==='artist')items=[{icon:'🎵',label:'הוסף שיר',action:openAddCard}];
  else items=[{icon:'📌',label:'הוסף פתק',action:openAddCard}];

  items.forEach(function(item){
    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;direction:rtl;cursor:pointer;';
    var lbl=document.createElement('div');
    lbl.style.cssText='background:rgba(28,38,34,.96);color:var(--white);font-size:.85rem;font-weight:700;'
      +'padding:10px 16px;border-radius:20px;white-space:nowrap;'
      +'box-shadow:0 2px 10px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);';
    lbl.textContent=item.label;
    var btn=document.createElement('div');
    btn.style.cssText='width:44px;height:44px;border-radius:50%;background:var(--accent);'
      +'display:flex;align-items:center;justify-content:center;font-size:1.2rem;'
      +'box-shadow:0 2px 10px rgba(0,0,0,.4);flex-shrink:0;';
    btn.textContent=item.icon;
    // Make ENTIRE row clickable
    row.onclick=function(e){e.stopPropagation();menu.remove();item.action();};
    lbl.onclick=function(e){e.stopPropagation();menu.remove();item.action();};
    btn.onclick=function(e){e.stopPropagation();menu.remove();item.action();};
    row.appendChild(lbl);row.appendChild(btn);menu.appendChild(row);
  });
  document.body.appendChild(menu);
  setTimeout(function(){
    document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h);},{once:true});
  },80);
}

function addFolderPrompt(){var name=prompt('שם לתיקייה חדשה:');if(!name||!name.trim())return;var colors=['#a03050','#3a6050','#4a4868','#5a4840','#486058'];var id='f_'+uid();saveUndo();FOLDERS.push({id:id,he:name.trim(),color:colors[FOLDERS.length%colors.length],note:'var(--n-ideas)',subs:['הכל']});save();render();}
function openAddCard(){modalFolder=state.activeFolder||'music';if(state.view==='artist'&&state.activeArtist){var art=state.artists.find(function(a){return a.id===state.activeArtist;});modalSub=art?art.name:null;}else{modalSub=(state.activeSub&&state.activeSub!=='הכל')?state.activeSub:null;}renderModalFolders();var mf=document.getElementById('modal-folders');mf.style.display=state.view!=='home'?'none':'flex';document.getElementById('modal-text').value='';document.getElementById('modal-overlay').classList.add('open');setTimeout(function(){document.getElementById('modal-text').focus();},100);}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.getElementById('modal-folders').style.display='flex';}
function renderModalFolders(){var el=document.getElementById('modal-folders');el.innerHTML='';FOLDERS.filter(function(f){return f.id!=='done';}).forEach(function(f){var btn=document.createElement('button');btn.className='mf-btn'+(f.id===modalFolder?' active':'');btn.style.background=f.id===modalFolder?f.color:'none';btn.style.color=f.id===modalFolder?'#000':'rgba(255,255,255,.4)';btn.style.borderColor=f.id===modalFolder?f.color:'rgba(255,255,255,.1)';btn.textContent=fLabel(f);btn.onclick=function(){modalFolder=f.id;modalSub=null;renderModalFolders();renderModalSubs();};el.appendChild(btn);});renderModalSubs();}
function renderModalSubs(){var f=FOLDERS.find(function(x){return x.id===modalFolder;});var el=document.getElementById('modal-subs');el.innerHTML='';if(!f)return;var subs=f.subs.filter(function(s){return s!=='הכל';});subs.forEach(function(sub){var btn=document.createElement('button');btn.className='ms-btn'+(sub===modalSub?' active':'');btn.textContent=sub;btn.onclick=function(){modalSub=sub;renderModalSubs();};el.appendChild(btn);});if(!modalSub&&subs.length)modalSub=subs[0];}
function quickAdd(){var text=document.getElementById('modal-text').value.trim();if(!text){document.getElementById('modal-text').focus();return;}var f=FOLDERS.find(function(x){return x.id===modalFolder;})||FOLDERS[0];var sub=modalSub||(f.subs.find(function(s){return s!=='הכל';}))||f.subs[0];saveUndo();state.cards.unshift({id:uid(),folder:modalFolder,sub:sub,text:text,date:today(),done:false,notes:'',tasks:[],status:'',moneyTotal:'',moneyPaid:''});save();closeModal();render();showToast('📌 נוסף ל'+fLabel(f));}
document.getElementById('modal-text').addEventListener('keydown',function(e){if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))quickAdd();});

// TOAST
var toastT;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},3500);}

document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeDrawer();closeMoveTo();}});

// INIT
function showApp(){
  document.getElementById('app').style.display='flex';
  document.getElementById('fab').style.display='flex';
  // Always start on home
  state.view='home';
  state.activeFolder=null;
  state.activeArtist=null;
  render();
  setTimeout(function(){
    var s=document.getElementById('splash');
    if(s){s.classList.add('hide');setTimeout(function(){s.remove();},500);}
  },500);
}
var savedUrl=localStorage.getItem(FB_KEY);
if(savedUrl){initFirebase(savedUrl);showApp();}
else{setTimeout(function(){var s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(function(){s.remove();},500);}document.getElementById('fb-setup').classList.add('open');},1000);}
</script>
</body>
